<!doctype html>
<html lang="pt-BR">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  
  <title>Roteiro de Viagem | Foz do Iguaçu</title>
  <meta name="description" content="Guia pessoal de viagem para Foz do Iguaçu, organizado por dia.">
  
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Manrope:wght@400;500;600;700;800&display=swap" rel="stylesheet">
  <link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght@400&display=swap" rel="stylesheet">
  
  <link rel="stylesheet" href="src/styles/normalize.css">
  <link rel="stylesheet" href="src/styles/main.css">
</head>
<body>
  <a class="skip-link" href="#conteudo-principal">Pular para o conteúdo</a>

  <header class="site-header">
    <div class="content-width">
      <p class="header-kicker">Guia pessoal de viagem</p>
      <div class="trip-heading-group">
        <h1 id="trip-title" class="trip-title"></h1>
        <p id="trip-period" class="trip-period"></p>
      </div>
      <ul id="trip-indicators" class="indicator-list" aria-label="Indicadores gerais"></ul>
    </div>
  </header>

  <main id="conteudo-principal" class="main-content content-width">
    <section aria-labelledby="days-nav-title" class="days-section">
      <h2 id="days-nav-title" class="section-title">Dias do roteiro</h2>
      <nav id="day-nav" class="day-nav" aria-label="Selecionar dia"></nav>
    </section>

    <section id="day-summary" class="day-summary" aria-live="polite"></section>

    <section aria-labelledby="activities-title" class="activities-section">
      <h2 id="activities-title" class="section-title">Passeios</h2>
      <div id="activities" class="activities-grid"></div>
    </section>
  </main>

  <template id="activity-card-template">
    <article class="activity-card">
      <header class="activity-header">
        <div class="activity-head-main">
          <span class="priority-badge"></span>
          <h3 class="activity-name"></h3>
        </div>
        <div class="activity-media" aria-hidden="true">
          <div class="activity-image"></div>
        </div>
      </header>

      <div class="activity-content-grid">
      <section class="info-block card-block">
        <div class="block-head">
          <span class="material-symbols-outlined block-icon" aria-hidden="true">location_on</span>
          <h4>Endereço e mapa</h4>
        </div>
        <p class="activity-address"></p>
        <div class="actions">
          <button type="button" class="btn btn-ghost action-copy">
            <span class="material-symbols-outlined btn-icon" aria-hidden="true">content_copy</span>
            Copiar endereço
          </button>
          <a class="btn btn-primary action-map" target="_blank" rel="noopener noreferrer">
            <span class="material-symbols-outlined btn-icon" aria-hidden="true">map</span>
            Abrir mapa
          </a>
        </div>
      </section>

      <section class="info-block card-block">
        <div class="block-head">
          <span class="material-symbols-outlined block-icon" aria-hidden="true">payments</span>
          <h4>Ingressos</h4>
        </div>
        <div class="ticket-meta-row">
          <p class="ticket-price"></p>
          <p class="ticket-status-badge"></p>
        </div>
        <a class="btn btn-soft action-official" target="_blank" rel="noopener noreferrer">Link oficial</a>
      </section>

      <section class="info-block card-block">
        <div class="block-head">
          <span class="material-symbols-outlined block-icon" aria-hidden="true">schedule</span>
          <h4>Funcionamento</h4>
        </div>
        <div class="operation-row">
          <span class="open-days"></span>
          <strong class="open-hours"></strong>
        </div>
      </section>

      <section class="info-block card-block">
        <div class="block-head">
          <span class="material-symbols-outlined block-icon" aria-hidden="true">event_note</span>
          <h4>Planejamento</h4>
        </div>
        <div class="planning-grid">
          <div class="planning-item">
            <p class="planning-label">Distância</p>
            <p class="planning-value distance"></p>
          </div>
          <div class="planning-item">
            <p class="planning-label">Tempo</p>
            <p class="planning-value time"></p>
          </div>
          <div class="planning-item">
            <p class="planning-label">Valor</p>
            <p class="planning-value cost"></p>
          </div>
        </div>
      </section>

      <section class="info-block card-block checklist-block">
        <div class="block-head">
          <span class="material-symbols-outlined block-icon" aria-hidden="true">checklist</span>
          <h4>Checklist</h4>
        </div>
        <ul class="checklist"></ul>
      </section>

      <section class="notes">
        <div class="notes-inner">
          <span class="material-symbols-outlined notes-icon" aria-hidden="true">sticky_note_2</span>
          <div>
            <h4>Notas</h4>
            <p class="notes-text"></p>
          </div>
        </div>
      </section>
      </div>
    </article>
  </template>

  <p id="toast" class="toast" role="status" aria-live="polite" hidden></p>

  <script type="module" src="src/scripts/main.js"></script>
</body>
</html>
