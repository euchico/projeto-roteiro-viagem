<!doctype html>
<html lang="pt-BR">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Roteiro de Viagem | Foz do Iguaçu</title>
  <meta name="description" content="Guia pessoal de viagem para Foz do Iguaçu, organizado por dia.">
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Manrope:wght@400;500;600;700;800&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="src/styles/normalize.css">
  <link rel="stylesheet" href="src/styles/main.css">
</head>
<body>
  <a class="skip-link" href="#conteudo-principal">Pular para o conteúdo</a>

  <header class="site-header">
    <div class="container">
      <p class="header-kicker">Guia pessoal de viagem</p>
      <h1 id="trip-title" class="trip-title"></h1>
      <p id="trip-period" class="trip-period"></p>
      <ul id="trip-indicators" class="indicator-list" aria-label="Indicadores gerais"></ul>
    </div>
  </header>

  <main id="conteudo-principal" class="container">
    <section aria-labelledby="days-nav-title" class="days-section">
      <h2 id="days-nav-title" class="section-title">Dias do roteiro</h2>
      <nav id="day-nav" class="day-nav" aria-label="Selecionar dia"></nav>
    </section>

    <section id="day-summary" class="day-summary" aria-live="polite"></section>

    <section aria-labelledby="activities-title" class="activities-section">
      <h2 id="activities-title" class="section-title">Passeios</h2>
      <div id="activities" class="activities-grid"></div>
    </section>
  </main>

  <template id="activity-card-template">
    <article class="activity-card">
      <header class="activity-header">
        <div>
          <p class="activity-index"></p>
          <h3 class="activity-name"></h3>
        </div>
        <span class="priority-badge"></span>
      </header>

      <section class="info-block">
        <h4>Endereço e mapa</h4>
        <p class="activity-address"></p>
        <div class="actions">
          <button type="button" class="btn btn-ghost action-copy">Copiar endereço</button>
          <a class="btn btn-primary action-map" target="_blank" rel="noopener noreferrer">Abrir mapa</a>
        </div>
      </section>

      <section class="info-block">
        <h4>Ingressos</h4>
        <p class="ticket-price"></p>
        <p class="ticket-status"></p>
        <a class="btn btn-ghost action-official" target="_blank" rel="noopener noreferrer">Link oficial</a>
      </section>

      <section class="info-block info-grid">
        <h4>Funcionamento</h4>
        <p><strong>Dias:</strong> <span class="open-days"></span></p>
        <p><strong>Entrada:</strong> <span class="open-hours"></span></p>
      </section>

      <section class="info-block info-grid">
        <h4>Planejamento</h4>
        <p><strong>Melhor horário:</strong> <span class="best-time"></span></p>
        <p><strong>Deslocamento:</strong> <span class="travel-time"></span></p>
        <p><strong>Duração:</strong> <span class="duration"></span></p>
      </section>

      <section class="info-block">
        <h4>Checklist</h4>
        <ul class="checklist"></ul>
      </section>

      <section class="info-block notes">
        <h4>Notas</h4>
        <p class="notes-text"></p>
      </section>
    </article>
  </template>

  <p id="toast" class="toast" role="status" aria-live="polite" hidden></p>

  <script type="module" src="src/scripts/main.js"></script>
</body>
</html>
